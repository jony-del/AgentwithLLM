# CI (revision guide Q7/D6): full pytest on Windows, Linux, and macOS (Windows is the
# primary dev environment, so it is a required lane), plus ruff E/F and mypy over
# every production module.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (all capability extras + dev tooling)
        # Core deps are the minimal library surface (D1/D9); the full suite needs the
        # capability extras too. The core-only surface is covered by
        # tests/test_import_boundary.py, which blocks the extras in a subprocess.
        run: pip install -e .[all,dev]
      - name: Lint (ruff E/F)
        run: python -m ruff check agent_core tests installer
      - name: Type-check production modules (mypy)
        run: python -m mypy
      - name: Tests
        env:
          # The renderer contract is "color=False emits zero ANSI" even when the
          # runner injects FORCE_COLOR; keep the lane honest about that.
          FORCE_COLOR: "1"
        run: python -m pytest -q
      - name: Installer dry-run
        run: python installer/install.py --source . --dry-run --skip-sandbox --non-interactive
      - name: Validate uninstall recovery core
        run: python agent_core/uninstall.py --help
      - name: Validate shell entrypoint
        if: runner.os != 'Windows'
        run: bash -n install.sh
      - name: Validate PowerShell entrypoint
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-Command ./install.ps1 | Out-Null
