# CI (revision guide Q7/D6): full pytest on both platforms (Windows is the primary
# dev environment, so it is a required lane, not an afterthought), plus the stage-1
# lint/type gates — ruff E/F and mypy over the contract modules. Widen incrementally;
# never loosen back.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (runtime + dev extras)
        run: pip install -e .[dev]
      - name: Lint (ruff E/F)
        run: python -m ruff check agent_core tests
      - name: Type-check contract modules (mypy)
        run: python -m mypy
      - name: Tests
        env:
          # The renderer contract is "color=False emits zero ANSI" even when the
          # runner injects FORCE_COLOR; keep the lane honest about that.
          FORCE_COLOR: "1"
        run: python -m pytest -q
