[project]
name = "agent-with-mini-llm"
version = "0.1.0"
description = "A minimal Python ReAct agent framework with Claude, tools, hooks, permissions, and compression."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0"]
# Optional: the official Model Context Protocol SDK. Only needed to connect to MCP
# servers (`[mcp.servers.*]` in agent.toml). The core stays dependency-free without it.
mcp = ["mcp>=1.0"]

[project.scripts]
agent-core = "agent_core.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

